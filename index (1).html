<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日市場新聞整理 — SinoPac Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b2a;--navy-mid:#1a2e45;--gold:#c9922a;--gold-light:#e8b45a;--white:#f5f0e8;--white-dim:#d6cfc2;--green:#27ae60;--red:#c0392b;--red-light:#e74c3c;--mono:'JetBrains Mono',monospace;--serif:'Noto Serif TC',serif;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--navy);color:var(--white);min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(201,146,42,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(192,57,43,.05) 0%,transparent 60%)}
.hdr{text-align:center;padding:32px 16px 24px;border-bottom:1px solid rgba(201,146,42,.15)}
.hdr .eye{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--gold);margin-bottom:8px}
.hdr h1{font-family:var(--serif);font-size:24px;font-weight:700;letter-spacing:2px}
.hdr .sub{font-size:12px;color:var(--white-dim);margin-top:5px;letter-spacing:1px}
.divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto}
.wrap{max-width:880px;margin:0 auto;padding:28px 16px 60px}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:24px}
.tab{font-family:var(--mono);font-size:10px;letter-spacing:2px;padding:10px 18px;border:none;background:none;color:var(--white-dim);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;transition:.2s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.pane{display:none}.pane.on{display:block}
.panel{background:var(--navy-mid);border:1px solid rgba(201,146,42,.2);border-radius:4px;padding:22px;margin-bottom:18px}
.ptitle{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.ptitle::after{content:'';flex:1;height:1px;background:rgba(201,146,42,.2)}
textarea,input[type=text],input[type=password],input[type=date]{width:100%;background:var(--navy);border:1px solid rgba(255,255,255,.08);border-radius:3px;color:var(--white);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s}
textarea{resize:vertical;line-height:1.8}
textarea:focus,input:focus{border-color:rgba(201,146,42,.5)}
textarea::placeholder,input::placeholder{color:rgba(255,255,255,.2)}
.key-row{display:flex;gap:8px;align-items:center}
.key-row input{flex:1}
.key-hint{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.25);margin-top:7px}
.key-hint a{color:rgba(201,146,42,.6);text-decoration:none}
.key-hint a:hover{color:var(--gold)}
.date-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date-row label{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--white-dim)}
input[type=date]{width:170px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
button{font-family:var(--mono);font-size:11px;letter-spacing:2px;padding:9px 22px;border-radius:2px;border:none;cursor:pointer;transition:.2s;text-transform:uppercase}
.btn-p{background:var(--gold);color:var(--navy);font-weight:500}
.btn-p:hover{background:var(--gold-light)}
.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-s{background:transparent;color:var(--white-dim);border:1px solid rgba(255,255,255,.15)}
.btn-s:hover{border-color:var(--white-dim);color:var(--white)}
.btn-g{background:transparent;color:var(--green);border:1px solid rgba(39,174,96,.4)}
.btn-g:hover{background:rgba(39,174,96,.1)}
.btn-show{padding:8px 14px;background:transparent;color:var(--white-dim);border:1px solid rgba(255,255,255,.1);font-size:10px}
.status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--white-dim);min-height:32px;padding:4px 0}
.spin{width:13px;height:13px;border:1.5px solid rgba(201,146,42,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;display:none}
.spin.on{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:var(--red-light)}
.seg{background:var(--navy-mid);border-left:3px solid var(--gold);padding:18px 22px;margin-bottom:14px;border-radius:0 4px 4px 0;animation:fi .35s ease both}
.seg:nth-child(2n){border-left-color:var(--red)}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.seg-lbl{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.seg:nth-child(2n) .seg-lbl{color:var(--red-light)}
.seg-txt{font-family:var(--serif);font-size:14px;line-height:2;color:var(--white)}
.seg-edit{width:100%;background:transparent;border:1px solid rgba(255,255,255,.06);color:var(--white);font-family:var(--serif);font-size:14px;line-height:2;padding:7px;border-radius:3px;resize:vertical;outline:none;display:none}
.seg-edit:focus{border-color:rgba(201,146,42,.4)}
.seg-acts{display:flex;justify-content:flex-end;gap:6px;margin-top:8px}
.btn-t{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;padding:4px 12px;border-radius:2px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--white-dim);cursor:pointer;text-transform:uppercase}
.btn-t:hover{border-color:var(--gold);color:var(--gold)}
.final{background:var(--navy);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:18px;font-family:var(--serif);font-size:14px;line-height:2.2;color:var(--white);white-space:pre-wrap;display:none}
.final.on{display:block}
.out-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.copied{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:2px;opacity:0;transition:opacity .3s}
.copied.on{opacity:1}
#t3{display:none}.#t3.on{display:block}
</style>
</head>
<body>
<div class="hdr">
  <div class="eye">SinoPac Daily</div>
  <h1>每日市場新聞整理</h1>
  <div class="sub">六大市場 · Gemini AI 輔助撰寫</div>
  <div class="divider"></div>
</div>
<div class="wrap">
  <div class="tabs">
    <button class="tab on" data-t="t1">① 設定</button>
    <button class="tab" data-t="t2">② 新聞 / 區間</button>
    <button class="tab" data-t="t3">③ 整理結果</button>
  </div>

  <div class="pane on" id="t1">
    <div class="panel">
      <div class="ptitle">Gemini API Key</div>
      <div class="key-row">
        <input type="password" id="apiKey" placeholder="貼上你的 Gemini API Key…">
        <button class="btn-show" id="btnShow">顯示</button>
      </div>
      <div class="key-hint">Key 僅存於本機記憶體，不會傳出。取得 Key：<a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></div>
    </div>
    <div class="panel">
      <div class="ptitle">交易日期</div>
      <div class="date-row">
        <label>昨日交易日</label>
        <input type="date" id="gDate">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-p" onclick="goTo('t2')">下一步 →</button>
    </div>
  </div>

  <div class="pane" id="t2">
    <div class="panel">
      <div class="ptitle">① 貼上原始新聞</div>
      <textarea id="rawInput" rows="12" placeholder="將從路透終端複製的原始新聞全文貼在這裡…（六個市場混貼亦可）"></textarea>
    </div>
    <div class="panel">
      <div class="ptitle">② 貼上 Excel 預估區間文字</div>
      <textarea id="rangeInput" rows="5" placeholder="直接把 Excel 黃色區塊的文字貼進來，例如：&#10;今日美元兌台幣匯率預估交易區間在 32.008-32.048&#10;在岸人民幣收盤價6.893(前6.893)，離岸人民幣收盤價6.894(前6.884)，今日CNH預估區間為6.8488-6.9288&#10;EURUSD下跌至1.1608，今日預估區間交易為1.1548-1.1668，USDJPY升至158.7，今日預估區間交易為157.93-161.03"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn-s" onclick="goTo('t1')">← 上一步</button>
      <button class="btn-p" id="btnGen">▶ 產生整理報告</button>
    </div>
    <div class="status"><div class="spin" id="spin"></div><span id="statusMsg"></span></div>
  </div>

  <div class="pane" id="t3">
    <div id="segsWrap"></div>
    <div class="out-hdr">
      <div class="ptitle" style="margin-bottom:0;flex:1">完整報告文字</div>
      <button class="btn-g" id="btnCopy">複製全文</button>
      <span class="copied" id="copiedMsg">✓ 已複製</span>
    </div>
    <div class="final" id="finalBox"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const MARKETS=[{key:'twd',label:'台灣匯市'},{key:'cnh',label:'中國匯市'},{key:'dxy',label:'美元指數'},{key:'us_eq',label:'美國股市'},{key:'us_bd',label:'美國債市'},{key:'tw_bd',label:'台灣債市'}];

(function(){const d=new Date();d.setDate(d.getDate()-1);$('gDate').value=d.toISOString().slice(0,10)})();

document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>goTo(b.dataset.t)));
function goTo(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id===t));
}

$('btnShow').addEventListener('click',()=>{
  const inp=$('apiKey');
  const show=inp.type==='text';
  inp.type=show?'password':'text';
  $('btnShow').textContent=show?'顯示':'隱藏';
});

function fmtDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}月${d.getDate()}日`}
function setStatus(msg,isErr=false){const el=$('statusMsg');el.textContent=msg;el.className=isErr?'err':''}
function setSpin(on){$('spin').classList.toggle('on',on)}

$('btnGen').addEventListener('click',async()=>{
  const apiKey=$('apiKey').value.trim();
  if(!apiKey){setStatus('請先在設定頁填入 Gemini API Key',true);goTo('t1');return}
  const raw=$('rawInput').value.trim();
  if(!raw){setStatus('請先貼上原始新聞',true);return}
  const dateLabel=fmtDate($('gDate').value)||'（請填入日期）';
  const rangeRaw=$('rangeInput').value.trim();
  const rangeBlock=rangeRaw?`\n\n【以下是從 Excel 取得的預估區間與行情文字，請直接嵌入相應市場段落的結尾，不要改動數字】\n${rangeRaw}`:'';

  const systemPrompt=`你是一位台灣金融機構的市場分析師，負責每日整理國際市場新聞為六大市場摘要。

重要：你只能輸出一個純粹的 JSON 物件，絕對不可以有任何前言、說明、markdown 標記或反引號，格式如下：
{"twd":"台灣匯市段落","cnh":"中國匯市段落","dxy":"美元指數段落","us_eq":"美國股市段落","us_bd":"美國債市段落","tw_bd":"台灣債市段落"}

撰寫規範：
1. 每段落以「${dateLabel}，」開頭
2. 每段落約150-200字，文字精煉專業，適合金融機構書面報告
3. 段落結構：當日行情概述 → 主要驅動因素 → 後續展望 → （如有）預估區間
4. 台灣匯市結尾加入：今日美元兌台幣匯率預估交易區間在 XX-XX
5. 中國匯市結尾加入：今日CNH預估區間為 XX-XX
6. 美元指數結尾加入EURUSD與USDJPY預估區間（格式：EURUSD升至X.XXXX，今日預估區間交易為X.XXXX-X.XXXX。USDJPY下跌至XXX.XX，今日預估區間交易為XXX.XX-XXX.XX）
7. 數字、點位、利率請從原始資料準確引用，不得自行捏造
8. 使用繁體中文，語氣正式流暢
9. 用語統一使用台灣慣用說法：「特朗普」→「川普」、「聯儲局」→「聯準會」、「人行」→「中國央行」、「滙率」→「匯率」，遇到其他對岸用語亦請自行對應修正`;

  const userPrompt=`請根據以下原始新聞整理成六大市場摘要。${rangeBlock}\n\n【原始新聞】\n${raw}`;

  $('btnGen').disabled=true;
  setSpin(true);
  setStatus('Gemini 整理中，請稍候…');

  try{
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:systemPrompt}]},
        contents:[{role:'user',parts:[{text:userPrompt}]}],
        generationConfig:{temperature:0.3,maxOutputTokens:4096,responseMimeType:'application/json'}
      })
    });
    const data=await resp.json();
    if(data.error)throw new Error(`Gemini 錯誤：${data.error.message}`);
    const text=(data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
    let parsed;
    try{
      let clean=text.replace(/```json/g,'').replace(/```/g,'').trim();
      const s=clean.indexOf('{'),e=clean.lastIndexOf('}');
      if(s<0||e<0)throw new Error('no json');
      parsed=JSON.parse(clean.slice(s,e+1));
    }catch{console.error(text);throw new Error('回應格式異常，請重試')}
    renderSegs(parsed);
    setSpin(false);
    setStatus('整理完成 ✓');
    goTo('t3');
  }catch(err){
    setSpin(false);
    setStatus('發生錯誤：'+err.message,true);
  }
  $('btnGen').disabled=false;
});

function renderSegs(data){
  const c=$('segsWrap');c.innerHTML='';
  MARKETS.forEach((m,i)=>{
    const text=data[m.key]||'';
    const seg=document.createElement('div');
    seg.className='seg';seg.style.animationDelay=`${i*.05}s`;
    seg.innerHTML=`<div class="seg-lbl">${m.label}</div><div class="seg-txt" id="st-${m.key}">${text}</div><textarea class="seg-edit" id="se-${m.key}" rows="5">${text}</textarea><div class="seg-acts"><button class="btn-t" onclick="toggleEdit('${m.key}')">編輯</button><button class="btn-t" onclick="saveEdit('${m.key}')">儲存</button></div>`;
    c.appendChild(seg);
  });
  buildFinal();
  $('finalBox').classList.add('on');
}

function toggleEdit(key){
  const v=$('st-'+key),e=$('se-'+key);
  const ed=e.style.display==='block';
  v.style.display=ed?'block':'none';
  e.style.display=ed?'none':'block';
  if(!ed)e.value=v.textContent;
}

function saveEdit(key){
  const v=$('st-'+key),e=$('se-'+key);
  v.textContent=e.value;v.style.display='block';e.style.display='none';
  buildFinal();
}

function buildFinal(){
  const paras=MARKETS.map(m=>($('st-'+m.key)||{}).textContent||'').filter(Boolean);
  $('finalBox').textContent=paras.join('\n\n');
}

function buildHtml(){
  const paras=MARKETS.map(m=>{
    const t=(($('st-'+m.key)||{}).textContent||'').trim();
    if(!t)return'';
    return`<p style="font-family:'微軟正黑體',sans-serif;font-size:12pt;line-height:1.8;margin:0 0 12pt 0;">${t}</p>`;
  }).filter(Boolean);
  return'<html><body>'+paras.join('')+'</body></html>';
}

$('btnCopy').addEventListener('click',async()=>{
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([buildHtml()],{type:'text/html'}),'text/plain':new Blob([$('finalBox').textContent],{type:'text/plain'})})]);
  }catch{await navigator.clipboard.writeText($('finalBox').textContent)}
  const m=$('copiedMsg');m.classList.add('on');setTimeout(()=>m.classList.remove('on'),2000);
});
</script>
</body>
</html>
